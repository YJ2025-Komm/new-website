[build]
  base = "client"
  command = "npm install && node scripts/generate-sitemap.js && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "https://new-website-r4rq.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/website-analysis"
  to = "/features"
  status = 301
  force = true
