<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative Elements -->
  <circle cx="150" cy="150" r="80" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1050" cy="480" r="120" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="1100" cy="100" r="60" fill="#06b6d4" opacity="0.15"/>
  
  <!-- Main Title -->
  <text x="100" y="200" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="url(#textGradient)">
    GeoRankers
  </text>
  
  <!-- Subtitle -->
  <text x="100" y="260" font-family="Arial, sans-serif" font-weight="600" font-size="42" fill="#475569">
    AI Search Intelligence Platform
  </text>
  
  <!-- Description -->
  <text x="100" y="320" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="#64748b">
    Track, optimize, and build brand authority across
  </text>
  <text x="100" y="360" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="#64748b">
    ChatGPT, Gemini, Perplexity, and Claude
  </text>
  
  <!-- AI Platform Icons (simplified) -->
  <rect x="100" y="420" width="50" height="50" rx="10" fill="#10b981" opacity="0.8"/>
  <text x="115" y="450" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="white">AI</text>
  
  <rect x="170" y="420" width="50" height="50" rx="10" fill="#3b82f6" opacity="0.8"/>
  <text x="185" y="450" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="white">AI</text>
  
  <rect x="240" y="420" width="50" height="50" rx="10" fill="#8b5cf6" opacity="0.8"/>
  <text x="255" y="450" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="white">AI</text>
  
  <rect x="310" y="420" width="50" height="50" rx="10" fill="#f59e0b" opacity="0.8"/>
  <text x="325" y="450" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="white">AI</text>
  
  <!-- Website URL -->
  <text x="100" y="550" font-family="Arial, sans-serif" font-weight="500" font-size="24" fill="#475569">
    georankers.co
  </text>
</svg>