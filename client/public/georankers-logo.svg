<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main Brand Gradient: Blue to Violet -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent Gradient for Icon -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle Shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background Circle for Icon -->
  <circle cx="30" cy="40" r="24" fill="url(#iconGradient)" filter="url(#dropShadow)" opacity="0.1"/>
  
  <!-- AI Search Icon -->
  <g transform="translate(18, 28)">
    <!-- Search Circle -->
    <circle cx="10" cy="10" r="8" stroke="url(#iconGradient)" stroke-width="2.5" fill="none"/>
    <!-- Search Handle -->
    <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- AI Brain Dots -->
    <circle cx="10" cy="7" r="1.5" fill="url(#iconGradient)"/>
    <circle cx="7" cy="10" r="1.5" fill="url(#iconGradient)"/>
    <circle cx="13" cy="10" r="1.5" fill="url(#iconGradient)"/>
    <circle cx="10" cy="13" r="1.5" fill="url(#iconGradient)"/>
  </g>
  
  <!-- GeoRankers Text -->
  <text x="65" y="50" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="url(#brandGradient)">
    GeoRankers
  </text>
  
  <!-- Tagline -->
  <text x="67" y="62" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6B7280" opacity="0.8">
    AI Search Visibility Intelligence
  </text>
  
  <!-- Subtle Accent Lines -->
  <line x1="65" y1="54" x2="95" y2="54" stroke="url(#brandGradient)" stroke-width="1" opacity="0.3"/>
</svg>